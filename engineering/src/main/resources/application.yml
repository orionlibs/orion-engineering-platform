server:
  port: 8080
  address: 0.0.0.0
  shutdown: graceful
  error:
    http2:
      enabled: true
    tomcat:
      max-swallow-size: 50MB
    compression:
      enabled: true
      min-response-size: 512
    servlet:
      encoding:
        force: false

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: "*"
  metrics:
    enable:
      all: true
  prometheus:
    metrics:
      export:
        enabled: true

spring:
  application:
    name: Orion Engineering Platform
  main:
    banner-mode: off
  web:
    servlet:
      load-on-startup: 1
      multipart:
        max-file-size: 50MB
        max-request-size: 50MB
    error:
      include-binding-errors: always
      include-message: always
      include-stacktrace: never
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/orionengineeringplatform}
    username: ${POSTGRES_USER:orionengineeringplatform}
    password: ${POSTGRES_PASSWORD:changeit}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none   # schema managed by Flyway
    show-sql: false
    hikari:
      maximum-pool-size: ${POSTGRES_DB_MAX_POOL_SIZE:10}
      minimum-idle: ${POSTGRES_DB_MIN_IDLE:2}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000




# Production profile (default)
---
spring:
  config:
    activate:
      on-profile: "!test"